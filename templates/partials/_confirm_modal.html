{# Usage: include "partials/_confirm_modal.html" with modal_id="confirmDelete" title="Excluir?" message="Tem certeza?" confirm_url=url confirm_class="btn-danger" confirm_text="Excluir" #}
<div class="modal fade" id="{{ modal_id }}" tabindex="-1" aria-labelledby="{{ modal_id }}Label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="{{ modal_id }}Label">{{ title }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <p>{{ message }}</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <form method="post" action="{{ confirm_url }}" style="display:inline">
                    {% csrf_token %}
                    <button type="submit" class="btn {{ confirm_class }}">{{ confirm_text }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
