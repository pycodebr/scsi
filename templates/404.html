{% extends "base_app.html" %}

{% block title %}404 — Página não encontrada{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h1 class="display-1 text-muted">404</h1>
            <h2>Página não encontrada</h2>
            <p class="text-muted mt-3">A página que você procura não existe ou foi movida.</p>
            <a href="{% url 'dashboard' %}" class="btn btn-primary mt-3">
                <i class="bi bi-house-door me-1"></i>Voltar ao Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
